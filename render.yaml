services:
  - type: web
    name: surveytok-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false        # You'll paste this in from Neon
      - key: ADMIN_SECRET
        sync: false        # Admin password — MUST match ADMIN_SECRET on Vercel
      - key: NODE_ENV
        value: production
